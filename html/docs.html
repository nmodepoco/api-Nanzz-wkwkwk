<style>
[data-theme="dark"]{--bg:#08081a;--bg2:#0c0c20;--card:#111128;--card2:#161638;--card3:#1b1b40;--b1:rgba(110,60,230,.16);--b2:rgba(110,60,230,.32);--b3:rgba(110,60,230,.52);--p:#7c3aed;--p2:#9061f9;--p3:#b48bfc;--pg:rgba(124,58,237,.18);--cyan:#22d3ee;--green:#22c55e;--red:#f43f5e;--yellow:#fbbf24;--tx:#eeeeff;--tx2:#c0c0e0;--mu:#4a4a78;--mu2:#8080b8;--nav:rgba(8,8,26,.90);--inp:#070716;--resp:#050514}
[data-theme="light"]{--bg:#f2f0ff;--bg2:#ebe7ff;--card:#ffffff;--card2:#f6f3ff;--card3:#eee9ff;--b1:rgba(100,50,200,.12);--b2:rgba(100,50,200,.26);--b3:rgba(100,50,200,.48);--p:#6d28d9;--p2:#7c3aed;--p3:#8b5cf6;--pg:rgba(109,40,217,.12);--cyan:#0891b2;--green:#16a34a;--red:#dc2626;--yellow:#d97706;--tx:#1e1040;--tx2:#3d3070;--mu:#a090c0;--mu2:#6050a0;--nav:rgba(242,240,255,.93);--inp:#eae6ff;--resp:#e6e2ff}
:root{--mono:'Share Tech Mono',monospace;--head:'Orbitron',sans-serif;--body:'Rajdhani',sans-serif;--r:14px;--rs:10px;--rx:7px}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:var(--body);font-size:15px;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(circle,var(--b1) 1px,transparent 1px);background-size:32px 32px;opacity:.7}
.blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
.b1{width:420px;height:420px;top:-140px;right:-140px;background:radial-gradient(circle,var(--pg) 0%,transparent 70%);animation:bF 14s ease-in-out infinite alternate}
.b2{width:360px;height:360px;bottom:0;left:-120px;background:radial-gradient(circle,var(--pg) 0%,transparent 70%);animation:bF 11s ease-in-out infinite alternate-reverse}
@keyframes bF{0%{transform:translate(0,0)}100%{transform:translate(18px,-22px)}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}

.wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 0 30px;display:flex;flex-direction:column}
.nav{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;position:sticky;top:0;z-index:200;background:var(--nav);border-bottom:1px solid var(--b2)}
.nav-logo{font-family:var(--head);font-size:.82rem;font-weight:900;color:var(--p2);letter-spacing:3px}
.nav-logo em{color:var(--p3);font-style:normal}
.nav-r{display:flex;gap:8px}
.nbtn{width:33px;height:33px;border-radius:9px;background:var(--card2);border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--mu2);font-size:.78rem;transition:all .2s}
.nbtn:hover{border-color:var(--p2);color:var(--p2)}
.hero{margin:0;animation:fadeUp .45s ease both;padding:10px 10px 0}
.vid-box{position:relative;overflow:hidden;height:190px;background:var(--bg);border-radius:var(--r) var(--r) 0 0}
.vid-box video{width:100%;height:100%;object-fit:cover;display:block}
.hero-body{background:var(--card);border:1px solid var(--b2);border-radius:var(--r);border-top:none;padding:16px 18px 20px;position:relative}
.hero-body::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--p2),transparent)}
.eyebrow{font-family:var(--mono);font-size:.58rem;color:var(--p3);letter-spacing:3px;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.eyebrow::before{content:'';width:14px;height:1px;background:var(--p3)}
.htitle{font-family:var(--head);font-size:1.6rem;font-weight:900;color:var(--tx);letter-spacing:2px;line-height:1.05;margin-bottom:4px}
.htitle span{color:var(--p2)}
.hsub{font-family:var(--mono);font-size:.66rem;color:var(--mu2);margin-bottom:16px}
.hbtns{display:flex;gap:7px;flex-wrap:wrap}
.btn-o{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--b2);color:var(--mu2);border-radius:var(--rx);padding:8px 12px;font-family:var(--head);font-size:.58rem;font-weight:700;letter-spacing:1px;cursor:pointer;text-decoration:none;text-transform:uppercase;transition:all .2s}
.btn-o:hover{border-color:var(--p2);color:var(--p2)}
.sec{padding:0 16px;margin-top:12px}
.srch{position:relative}
.srch-ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--mu);font-size:.78rem}
.srch-inp{width:100%;background:var(--card);border:1px solid var(--b2);border-radius:var(--rs);padding:12px 12px 12px 38px;font-family:var(--mono);font-size:.74rem;color:var(--tx);outline:none;transition:all .2s}
.srch-inp:focus{border-color:var(--p2);box-shadow:0 0 0 2px var(--pg)}
.chips-wrap{padding:10px 16px 2px;overflow-x:auto;display:flex;gap:8px;scrollbar-width:none}
.chips-wrap::-webkit-scrollbar{display:none}
.chip{display:inline-flex;align-items:center;gap:6px;flex-shrink:0;padding:7px 14px;border-radius:999px;cursor:pointer;font-family:var(--head);font-size:.58rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;background:var(--card2);border:1px solid var(--b2);color:var(--mu2);transition:all .18s;user-select:none}
.chip:hover{transform:translateY(-1px);border-color:var(--p2);color:var(--p2)}
.chip.active{background:var(--p);border-color:var(--p2);color:#fff}
.ep-panel{padding:0 16px;margin-top:20px;display:flex;flex-direction:column;gap:6px}
.ep-panel.hidden{display:none}
.sub-heading{font-family:var(--head);font-size:.72rem;font-weight:700;color:var(--p3);letter-spacing:2px;text-transform:uppercase;padding:12px 6px 6px;border-bottom:1px solid var(--b1);margin-bottom:6px;display:flex;align-items:center;gap:7px}
.ep-item{background:var(--card);border:1px solid var(--b1);border-radius:var(--rs);overflow:hidden;transition:all .2s;animation:slideIn .22s ease both}
.ep-item.open{border-color:var(--p2)}
.ep-hdr{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;transition:background .18s}
.ep-hdr:hover{background:rgba(124,58,237,.05)}
.ep-item.open .ep-hdr{background:rgba(124,58,237,.08)}
.mb{font-family:var(--mono);font-size:.6rem;font-weight:700;padding:4px 8px;border-radius:4px;letter-spacing:.5px;flex-shrink:0}
.g{background:rgba(34,197,94,.11);color:#22c55e;border:1px solid rgba(34,197,94,.2)}
.po{background:rgba(124,58,237,.11);color:var(--p3);border:1px solid rgba(124,58,237,.22)}
.ep-name{flex:1;font-family:var(--mono);font-size:.8rem;font-weight:700;color:var(--mu2)}
.ep-item.open .ep-name{color:var(--p3)}
.ep-chv{color:var(--mu);font-size:.7rem;transition:all .25s}
.ep-item.open .ep-chv{transform:rotate(180deg);color:var(--p2)}
.ep-bw{display:grid;grid-template-rows:0fr;transition:grid-template-rows .28s ease}
.ep-item.open .ep-bw{grid-template-rows:1fr}
.ep-b{overflow:hidden}
.ep-bi{padding:13px 14px;border-top:1px solid var(--b1);opacity:0;transition:opacity .18s .08s}
.ep-item.open .ep-bi{opacity:1}
.ep-info{display:flex;align-items:flex-start;gap:7px;background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.16);border-radius:var(--rx);padding:8px 11px;margin-bottom:12px;font-family:var(--mono);font-size:.64rem;color:var(--mu2);line-height:1.6}
.ep-info i{color:var(--p3);margin-top:1px}
.fg{margin-bottom:10px}
.fl{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:.6rem;font-weight:700;color:var(--mu2);margin-bottom:4px}
.fn{color:var(--tx2)}.ft{background:var(--card3);border:1px solid var(--b1);padding:1px 5px;border-radius:3px;font-size:.52rem;color:var(--mu)}
.fr{color:var(--p3);font-size:.56rem}.fh{color:var(--mu);font-size:.56rem;margin-left:auto}
.fi{width:100%;background:var(--inp);border:1px solid var(--b2);border-radius:var(--rx);padding:9px 11px;font-family:var(--mono);font-size:.7rem;color:var(--tx);outline:none;transition:all .18s}
.fi:focus{border-color:var(--p2);box-shadow:0 0 0 2px var(--pg)}
select.fi{appearance:none;background-image:url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234a4a78' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");background-repeat:no-repeat;background-position:right 9px center;background-size:11px;padding-right:26px;cursor:pointer}
.file-upload-wrapper{position:relative;width:100%}
.file-upload-wrapper input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:2}
.file-upload-wrapper .file-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;background:var(--b1);border:2px dashed var(--b3);border-radius:var(--rx);font-family:var(--mono);font-size:.65rem;color:var(--p3);transition:all .2s;pointer-events:none}
.file-upload-wrapper:hover .file-btn{border-color:var(--p2);background:rgba(124,58,237,.1)}
.ul{font-family:var(--mono);font-size:.56rem;font-weight:700;color:var(--mu);margin-bottom:4px;display:block;letter-spacing:1.5px;text-transform:uppercase}
.ub{background:var(--inp);border:1px solid var(--b1);border-radius:var(--rx);padding:7px 10px;display:flex;align-items:flex-start;gap:6px;margin-bottom:10px}
.ut{font-family:var(--mono);font-size:.62rem;color:var(--cyan);word-break:break-all;flex:1;line-height:1.5}
.icb{background:transparent;border:none;cursor:pointer;color:var(--mu);padding:2px 4px;border-radius:4px;font-size:.72rem;transition:all .15s}
.icb:hover{background:var(--card3);color:var(--tx)}
.xbtn{width:100%;padding:14px 16px;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border:none;border-radius:var(--rx);font-family:var(--head);font-size:.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 4px 14px var(--pg);transition:all .18s;margin-top:4px}
.xbtn:hover{transform:translateY(-2px);box-shadow:0 8px 22px var(--pg)}
.xbtn:disabled{opacity:.45;cursor:not-allowed}
.rw{margin-top:10px;border:1px solid var(--b1);border-radius:var(--rx);overflow:hidden;background:var(--resp);display:none}
.rh{background:var(--card3);padding:6px 10px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--b1)}
.rd{width:7px;height:7px;border-radius:50%;background:var(--mu)}
.rd.ok{background:var(--green);box-shadow:0 0 5px var(--green)}
.rd.err{background:var(--red);box-shadow:0 0 5px var(--red)}
.rd.ld{background:var(--yellow);animation:pulse .9s infinite}
.rs{font-family:var(--mono);font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:3px;background:var(--card2);color:var(--mu2);white-space:nowrap}
.rs.ok{background:rgba(34,197,94,.11);color:var(--green)}
.rs.err{background:rgba(244,63,94,.11);color:var(--red)}
.rb{padding:10px;max-height:300px;overflow-y:auto}
.rb video{width:100%;max-width:100%;border-radius:8px}
.rb img{max-width:100%;border-radius:8px}
.rb audio{width:100%}
.rp{font-family:var(--mono);font-size:.65rem;color:var(--mu2);white-space:pre-wrap;word-break:break-word;margin:0;line-height:1.65}
footer{text-align:center;padding:22px 16px 8px;font-family:var(--mono);font-size:.58rem;color:var(--mu);line-height:2}
footer a{color:var(--mu);text-decoration:none;transition:color .18s}
footer a:hover{color:var(--p3)}
.toast{position:fixed;bottom:82px;right:14px;left:14px;max-width:280px;margin:0 auto;background:var(--card2);border:1px solid var(--p2);color:var(--p3);padding:9px 13px;border-radius:var(--rx);font-family:var(--mono);font-size:.66rem;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.45);transform:translateY(60px) scale(.96);opacity:0;transition:all .26s cubic-bezier(.34,1.56,.64,1);z-index:9999;display:flex;align-items:center;gap:7px}
.toast.show{transform:translateY(0) scale(1);opacity:1}
.td{position:fixed;top:56px;right:14px;z-index:999;background:var(--card);border:1px solid var(--b2);border-radius:var(--r);padding:8px;width:168px;box-shadow:0 14px 40px rgba(0,0,0,.55);transform:scale(.88) translateY(-8px);opacity:0;pointer-events:none;transition:all .2s cubic-bezier(.34,1.56,.64,1);transform-origin:top right}
.td.open{transform:scale(1) translateY(0);opacity:1;pointer-events:all}
.td-h{font-family:var(--mono);font-size:.52rem;font-weight:700;color:var(--mu);letter-spacing:2.5px;padding:4px 8px 7px;border-bottom:1px solid var(--b1);margin-bottom:6px;text-transform:uppercase}
.to{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;cursor:pointer;font-family:var(--mono);font-size:.64rem;font-weight:700;color:var(--mu2);user-select:none;transition:all .15s}
.to:hover{background:var(--card2);color:var(--tx)}
.to.active{background:rgba(124,58,237,.13);color:var(--p3)}
.tsw{width:16px;height:16px;border-radius:4px;flex-shrink:0;border:2px solid transparent}
.to.active .tsw{border-color:var(--p2)}
.tck{margin-left:auto;color:var(--p3);font-size:.6rem;opacity:0;transition:opacity .18s}
.to.active .tck{opacity:1}
.empty{text-align:center;padding:44px 16px;font-family:var(--mono);font-size:.7rem;color:var(--mu)}
.empty i{font-size:1.6rem;display:block;margin-bottom:10px;color:var(--b2)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>

<div class="blob b1"></div>
<div class="blob b2"></div>

<nav class="nav">
  <div class="nav-logo">NANZZ<em>API</em></div>
  <div class="nav-r">
    <button class="nbtn" id="tb" onclick="toggleTD()" title="Tema"><i class="fas fa-circle-half-stroke"></i></button>

<div class="td" id="td">

  <div class="to" data-theme="light" onclick="setTheme('light')"><div class="tsw" style="background:linear-gradient(135deg,#f2f0ff,#6d28d9)"></div>Light<i class="fas fa-check tck"></i></div>
</div>

<div class="wrap">
  <div class="hero">
    <div class="vid-box"><video autoplay muted loop playsinline id="hero-vid"><source src="https://kappa.lol/2HLn5j" type="video/mp4"></video></div>
    <div class="hero-body">
      <div class="eyebrow">FREE REST API</div>
      <div class="htitle">NANZZAPI<br><span>DOCS</span></div>
      <div class="hsub">Explore &amp; test live endpoints — all media supported.</div>
      <div class="hbtns">
        <a href="https://wa.me/6283178098872" target="_blank" class="btn-o"><i class="fas fa-code"></i> Contact Dev</a>
        <a href="https://whatsapp.com/channel/0029VbC1zvC4NVinIpJqza0h" target="_blank" class="btn-o"><i class="fab fa-whatsapp"></i> Channel</a>
      </div>
    </div>
  </div>

  <div class="sec" style="margin-top:14px;animation:fadeUp .4s .1s ease both;">
    <div class="srch"><i class="fas fa-search srch-ic"></i><input type="text" id="searchInput" class="srch-inp" placeholder="Filter endpoints..." autocomplete="off"/></div>
  </div>

  <div class="chips-wrap" id="chips-wrap"></div>
  <div id="ep-panel" class="ep-panel hidden"></div>
  <div id="search-panel" class="ep-panel hidden" style="margin-top:4px;"></div>

  <footer>NANZZAPI V2 &copy; 2026<br><a href="/">Home</a> · <a href="https://wa.me/6283178098872">Support</a></footer>
</div>

<div id="toast" class="toast"></div>

<script>
let CONFIG=null,ACTIVE_CAT='all';
const $=id=>document.getElementById(id),$$=sel=>document.querySelectorAll(sel);

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function tj(v,d){
  d=d||0;
  if(v===null)return'<span style="color:var(--red)">null</span>';
  if(typeof v==='boolean')return'<span style="color:#f9a8d4">'+v+'</span>';
  if(typeof v==='number')return'<span style="color:var(--yellow)">'+v+'</span>';
  if(typeof v==='string')return'<span style="color:var(--green)">"'+esc(v)+'"</span>';
  if(Array.isArray(v)){if(!v.length)return'[]';const ind='  '.repeat(d+1);return'[\n'+v.map(x=>ind+tj(x,d+1)).join(',\n')+'\n'+'  '.repeat(d)+']';}
  const ks=Object.keys(v);if(!ks.length)return'{}';const ind='  '.repeat(d+1);
  return'{\n'+ks.map(k=>ind+'<span style="color:#93c5fd">"'+esc(k)+'"</span>: '+tj(v[k],d+1)).join(',\n')+'\n'+'  '.repeat(d)+'}';
}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000);}
function setTheme(n){document.documentElement.setAttribute('data-theme',n);localStorage.setItem('nz_t',n);$$('.to').forEach(e=>e.classList.toggle('active',e.dataset.theme===n));$('td').classList.remove('open');const src=n==='light'?'https://kappa.lol/uJWEb9':'https://kappa.lol/2HLn5j';const vid=$('hero-vid');if(vid){vid.querySelector('source').src=src;vid.load();}}
function toggleTD(){$('td').classList.toggle('open');}
document.addEventListener('click',e=>{const d=$('td'),b=$('tb');if(!d.contains(e.target)&&!b.contains(e.target))d.classList.remove('open');});

function buildChips(){const tags=CONFIG?.tags||{};let h='<div class="chip active" onclick="filterCat(\'all\')">All</div>';Object.keys(tags).forEach(c=>h+=`<div class="chip" onclick="filterCat('${c}')">${c}</div>`);$('chips-wrap').innerHTML=h;}
function filterCat(c){ACTIVE_CAT=c;$$('.chip').forEach(x=>x.classList.toggle('active',x.textContent===c||(c==='all'&&x.textContent==='All')));$('search-panel').classList.add('hidden');$('ep-panel').classList.remove('hidden');render();}

function render(){
  const tags=CONFIG?.tags||{},q=($('searchInput').value||'').toLowerCase();
  let h='',total=0;
  Object.entries(tags).forEach(([cat,routes])=>{
    if(ACTIVE_CAT!=='all'&&cat!==ACTIVE_CAT)return;
    const filtered=routes.filter(r=>!q||(r.name||'').toLowerCase().includes(q)||(r.endpoint||'').toLowerCase().includes(q)||(r.description||'').toLowerCase().includes(q));
    if(!filtered.length)return;
    h+=`<div class="sub-heading">${cat} (${filtered.length})</div>`;
    filtered.forEach((r,i)=>{h+=renderCard(r,cat,i);total++;});
  });
  $('ep-panel').innerHTML=h||'<div class="empty">Tidak ada endpoint</div>';
}

function searchEps(q){
  const tags=CONFIG?.tags||{};
  const all=[];Object.entries(tags).forEach(([cat,routes])=>{routes.forEach(r=>all.push({...r,category:cat}));});
  const filtered=all.filter(r=>(r.name||'').toLowerCase().includes(q)||(r.endpoint||'').toLowerCase().includes(q));
  let h='';filtered.forEach((r,i)=>{h+=renderCard(r,r.category,i);});
  $('search-panel').innerHTML=h||'<div class="empty">Tidak ada hasil</div>';
  $('search-panel').classList.remove('hidden');$('ep-panel').classList.add('hidden');
}

function renderCard(r,cat,i){
  const mid=`${cat}-${i}`;
  const params=(r.params||[]).map(p=>{
    const sel=r.paramsSelect?.[p.name];
    const isFile=p.name==='file';
    if(isFile)return`<div class="fg"><div class="fl"><span class="fn">${p.name}</span><span class="ft">file</span><span class="fr">*</span></div><div class="file-upload-wrapper"><input type="file" id="i-${mid}-${p.name}" onchange="var fn=document.getElementById('fn-${mid}-${p.name}');if(fn&&this.files[0])fn.textContent=this.files[0].name;"><div class="file-btn"><i class="fas fa-cloud-upload-alt"></i> <span id="fn-${mid}-${p.name}">Pilih file...</span></div></div></div>`;
    if(sel)return`<div class="fg"><div class="fl"><span class="fn">${p.name}</span><span class="ft">select</span><span class="fr">${p.required?'*':''}</span></div><select class="fi" id="i-${mid}-${p.name}">${sel.map(o=>`<option>${o}</option>`).join('')}</select></div>`;
    return`<div class="fg"><div class="fl"><span class="fn">${p.name}</span><span class="ft">string</span><span class="fr">${p.required?'*':''}</span></div><input class="fi" id="i-${mid}-${p.name}" placeholder="${p.description||p.name}"></div>`;
  }).join('');
  const mc=r.method==='GET'?'g':'po';
  return`<div class="ep-item" id="ep-${mid}"><div class="ep-hdr" onclick="toggleCard('ep-${mid}')"><span class="mb ${mc}">${r.method}</span><span class="ep-name">${r.name||r.endpoint}</span><i class="fas fa-chevron-down ep-chv"></i></div><div class="ep-bw"><div class="ep-b"><div class="ep-bi"><div class="ep-info"><i class="fas fa-circle-info"></i><span>${r.description||''}</span></div>${params}<span class="ul">Request URL</span><div class="ub"><span class="ut" id="u-${mid}">${location.origin}${r.endpoint}</span><button class="icb" onclick="navigator.clipboard.writeText($('u-${mid}').textContent);toast('Copied!')"><i class="fas fa-copy"></i></button></div><button class="xbtn" id="btn-${mid}" onclick="exec('${mid}','${r.endpoint}','${r.method}')"><i class="fas fa-bolt"></i> Execute</button><div class="rw" id="rw-${mid}"><div class="rh"><div class="rd" id="rd-${mid}"></div><span class="rs" id="rs-${mid}">IDLE</span><span class="rs" id="rms-${mid}" style="margin-left:4px">ms</span><button class="icb" style="margin-left:auto" onclick="copyResp('${mid}')"><i class="fas fa-copy"></i></button></div><div class="rb" id="rb-${mid}"><pre class="rp">// Awaiting...</pre></div></div></div></div></div></div>`;
}

window.toggleCard=id=>$(id)?.classList.toggle('open');

let lastResp=null;
window.copyResp=id=>{if(lastResp)navigator.clipboard.writeText(lastResp).then(()=>toast('Copied!'));};

async function exec(mid,ep,method){
  const rw=$('rw-'+mid),rb=$('rb-'+mid),rs=$('rs-'+mid),rd=$('rd-'+mid),rms=$('rms-'+mid),btn=$('btn-'+mid);
  rw.style.display='block';rb.innerHTML='<pre class="rp">Loading...</pre>';rd.className='rd ld';rs.textContent='LOADING';
  btn.disabled=true;btn.innerHTML='<i class="fas fa-circle-notch fa-spin"></i>';
  let url=location.origin+ep;const t0=Date.now();
  const fileInput=$$(`[id^="i-${mid}-"][type="file"]`)[0];
  try{
    let res;
    if(fileInput&&fileInput.files[0]){
      const fd=new FormData();fd.append(fileInput.id.replace('i-'+mid+'-',''),fileInput.files[0]);
      $$(`[id^="i-${mid}-"]:not([type="file"])`).forEach(p=>{if(p.value)fd.append(p.id.replace('i-'+mid+'-',''),p.value);});
      res=await fetch(url,{method:'POST',body:fd});
    }else if(method==='POST'){
      res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    }else{
      const qp=[];$$(`[id^="i-${mid}-"]:not([type="file"])`).forEach(p=>{const n=p.id.replace('i-'+mid+'-','');if(p.value)qp.push(n+'='+encodeURIComponent(p.value));});
      if(qp.length)url+='?'+qp.join('&');
      res=await fetch(url,{method});
    }
    const ms=Date.now()-t0;rms.textContent=ms+'ms';const ct=res.headers.get('content-type')||'';
    if(ct.includes('video/')){const b=await res.blob();const ou=URL.createObjectURL(b);lastResp='[video]';rd.className='rd ok';rs.textContent=res.status+' OK';rs.className='rs ok';rb.innerHTML=`<video controls autoplay style="width:100%;border-radius:8px"><source src="${ou}" type="${ct}"></video>`;}
    else if(ct.includes('image/')){const b=await res.blob();const ou=URL.createObjectURL(b);lastResp='[image]';rd.className='rd ok';rs.textContent=res.status+' OK';rs.className='rs ok';rb.innerHTML=`<img src="${ou}" style="max-width:100%;border-radius:8px">`;}
    else if(ct.includes('audio/')){const b=await res.blob();const ou=URL.createObjectURL(b);lastResp='[audio]';rd.className='rd ok';rs.textContent=res.status+' OK';rs.className='rs ok';rb.innerHTML=`<audio controls style="width:100%"><source src="${ou}" type="${ct}"></audio>`;}
    else if(ct.includes('application/json')){const d=await res.json();lastResp=JSON.stringify(d,null,2);rd.className='rd ok';rs.textContent=res.status+' OK';rs.className='rs ok';rb.innerHTML=`<pre class="rp">${tj(d)}</pre>`;}
    else{const t=await res.text();lastResp=t;rd.className=res.ok?'rd ok':'rd err';rs.textContent=res.status+(res.ok?' OK':' ERROR');rs.className='rs '+(res.ok?'ok':'err');rb.innerHTML=`<pre class="rp">${esc(t)}</pre>`;}
  }catch(e){rms.textContent=(Date.now()-t0)+'ms';rd.className='rd err';rs.textContent='ERROR';rs.className='rs err';rb.innerHTML=`<pre class="rp" style="color:var(--red)">${e.message}</pre>`;}
  btn.disabled=false;btn.innerHTML='<i class="fas fa-bolt"></i> Execute';
}

$('searchInput').addEventListener('input',function(){const q=this.value.trim().toLowerCase();if(!q){$('search-panel').classList.add('hidden');$('ep-panel').classList.remove('hidden');return;}searchEps(q);});

async function init(){try{const res=await fetch('/src/config.json?t='+Date.now());CONFIG=await res.json();buildChips();render();}catch(e){$('ep-panel').innerHTML='<div class="empty" style="color:var(--red)">'+e.message+'</div>';}}

document.addEventListener('DOMContentLoaded',()=>{const s=localStorage.getItem('nz_t')||'dark';document.documentElement.setAttribute('data-theme',s);$$('.to').forEach(e=>e.classList.toggle('active',e.dataset.theme===s));init();});
</script>
