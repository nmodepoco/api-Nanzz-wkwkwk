<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>404 — NanzzApi</title>
<link rel="icon" type="image/png" href="https://nanzzcode.my.id/uploads/6a1a993b3e680_1780128059.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
[data-theme="dark"]{
  --bg:#08081a;--bg2:#0c0c20;--card:#111128;--card2:#161638;
  --b1:rgba(110,60,230,0.12);--b2:rgba(110,60,230,0.22);--b3:rgba(110,60,230,0.35);
  --p:#7c3aed;--p2:#9061f9;--p3:#a78bfa;
  --cyan:#22d3ee;--green:#22c55e;--red:#f43f5e;
  --tx:#e8e9f0;--tx2:#b0b5d0;--mu:#585b70;--mu2:#7c80a0;
}
[data-theme="light"]{
  --bg:#f2f0ff;--bg2:#ebe7ff;--card:#ffffff;--card2:#f6f3ff;
  --b1:rgba(100,50,200,0.10);--b2:rgba(100,50,200,0.18);--b3:rgba(100,50,200,0.28);
  --p:#6d28d9;--p2:#7c3aed;--p3:#8b5cf6;
  --cyan:#0891b2;--green:#16a34a;--red:#dc2626;
  --tx:#1e1040;--tx2:#3d3070;--mu:#a090c0;--mu2:#6050a0;
}
:root{--mono:'Share Tech Mono',monospace;--head:'Orbitron',sans-serif;--body:'Rajdhani',sans-serif;--r:14px;--rx:8px;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:var(--body);font-size:15px;min-height:100vh;overflow-x:hidden;display:flex;align-items:center;justify-content:center;transition:background .3s,color .3s}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(circle,var(--b1) 1px,transparent 1px);background-size:28px 28px;opacity:.6}

/* BLOB */
.blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0;will-change:transform;filter:blur(120px);opacity:.25}
.b1{width:500px;height:500px;top:-180px;right:-150px;background:radial-gradient(circle,var(--p) 0%,transparent 70%);animation:bF 12s ease-in-out infinite alternate}
.b2{width:400px;height:400px;bottom:-120px;left:-100px;background:radial-gradient(circle,var(--p3) 0%,transparent 70%);animation:bF 10s ease-in-out infinite alternate-reverse}
@keyframes bF{0%{transform:translate(0,0) scale(1)}100%{transform:translate(25px,-20px) scale(1.1)}}

/* PARTICLES */
.particles{position:fixed;inset:0;z-index:0;pointer-events:none}
.particle{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--p2);animation:float 8s ease-in infinite;opacity:0}
@keyframes float{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:.5}90%{opacity:.08}100%{transform:translateY(-10vh) scale(1.5);opacity:0}}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}

.wrap{position:relative;z-index:1;text-align:center;padding:40px 20px;animation:fadeUp .6s ease both}

.error-code{font-family:var(--head);font-size:7rem;font-weight:900;color:var(--p);line-height:1;margin-bottom:8px;letter-spacing:8px}
.error-icon{font-size:3rem;color:var(--p2);margin-bottom:20px;animation:floatIcon 3s ease-in-out infinite}
@keyframes floatIcon{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.error-title{font-family:var(--head);font-size:1.4rem;font-weight:900;color:var(--tx);margin-bottom:8px;letter-spacing:2px}
.error-sub{font-family:var(--mono);font-size:.7rem;color:var(--mu2);margin-bottom:32px;line-height:1.7;max-width:400px;margin-left:auto;margin-right:auto}
.error-path{font-family:var(--mono);font-size:.65rem;color:var(--p2);background:rgba(124,58,237,0.08);border:1px solid var(--b2);padding:8px 16px;border-radius:var(--rx);display:inline-block;margin-bottom:28px;word-break:break-all;max-width:90%}

.btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 22px;border-radius:var(--rx);font-family:var(--head);font-size:.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .25s}
.btn-primary{background:var(--p);color:#fff;border:none}
.btn-primary:hover{background:var(--p2);transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--p);border:1px solid var(--b2)}
.btn-outline:hover{border-color:var(--p);background:rgba(124,58,237,0.04);transform:translateY(-1px)}

.theme-btn{position:fixed;top:16px;right:16px;z-index:300;width:38px;height:38px;border-radius:50%;background:var(--card);border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--mu2);font-size:.8rem;transition:all .2s}
.theme-btn:hover{border-color:var(--p);color:var(--p);transform:rotate(30deg)}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="particles" id="particles"></div>

<button class="theme-btn" onclick="toggleTheme()" title="Tema">
  <i class="fas fa-circle-half-stroke"></i>
</button>

<div class="wrap">
  <div class="error-code">404</div>
  <div class="error-icon">🔮</div>
  <div class="error-title">Page Not Found</div>
  <p class="error-sub">
    Halaman yang kamu cari tidak ditemukan.<br>
    Mungkin sudah dipindahkan, dihapus, atau tidak pernah ada.
  </p>
  <div class="error-path" id="error-path">/unknown-path</div>
  <div class="btns">
    <a href="/" class="btn btn-primary">
      <i class="fas fa-home"></i> Back to Home
    </a>
    <a href="/docs" class="btn btn-outline">
      <i class="fas fa-book-open"></i> Documentation
    </a>
    <a href="/monitor" class="btn btn-outline">
      <i class="fas fa-chart-line"></i> Monitor
    </a>
  </div>
</div>

<script>
// PARTICLES
(function(){
  const container=document.getElementById('particles');
  for(let i=0;i<15;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*100+'%';
    p.style.animationDuration=(Math.random()*8+6)+'s';
    p.style.animationDelay=(Math.random()*8)+'s';
    p.style.width=(Math.random()*3+2)+'px';
    p.style.height=p.style.width;
    container.appendChild(p);
  }
})();

// Tampilkan URL yang diakses
document.getElementById('error-path').textContent = window.location.pathname || '/';

function toggleTheme(){
  const html=document.documentElement;
  const current=html.getAttribute('data-theme');
  const next=current==='dark'?'light':'dark';
  html.setAttribute('data-theme',next);
  localStorage.setItem('nz_t',next);
}

document.addEventListener('DOMContentLoaded',()=>{
  const s=localStorage.getItem('nz_t')||'dark';
  document.documentElement.setAttribute('data-theme',s);
});
</script>
</body>
</html>
